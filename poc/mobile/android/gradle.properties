# Project-wide Gradle settings.

org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# AndroidX
android.useAndroidX=true

# Target architectures to build.
reactNativeArchitectures=armeabi-v7a,arm64-v8a,x86,x86_64

# New Architecture (TurboModules / Fabric).
newArchEnabled=true

# Metro dev server port — must match the --port flag in package.json scripts.
reactNativeDevServerPort=8800

# Hermes JS engine.
hermesEnabled=true

# Edge-to-edge display.
edgeToEdgeEnabled=false

# Release signing config — set these before building a release APK for sideload (D4).
# Generate a keystore:
#   keytool -genkeypair -v -storetype PKCS12 -keystore ironpal-release.keystore \
#     -alias ironpal -keyalg RSA -keysize 2048 -validity 10000
# IRONPAL_RELEASE_STORE_FILE=../ironpal-release.keystore
# IRONPAL_RELEASE_STORE_PASSWORD=
# IRONPAL_RELEASE_KEY_ALIAS=ironpal
# IRONPAL_RELEASE_KEY_PASSWORD=

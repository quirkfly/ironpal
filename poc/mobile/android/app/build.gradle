apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    autolinkLibrariesWithApp()
}

/**
 * Run Proguard on Release builds to minify the bytecode.
 */
def enableProguardInReleaseBuilds = true

/**
 * The preferred build flavor of JavaScriptCore (JSC).
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.ironpal.poc"
    defaultConfig {
        applicationId "com.ironpal.poc"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "0.1"
        // Allow cleartext so a local dev backend reached via
        // `adb reverse tcp:8080 tcp:8080` works for early bring-up.
        // The production backend is HTTPS (D2); flip to "false" once it's up.
        manifestPlaceholders = [usesCleartextTraffic: "true"]
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            def props = new Properties()
            // Prefer the gitignored keystore.properties so passwords never enter the repo.
            def keystoreProps = rootProject.file('keystore.properties')
            if (keystoreProps.exists()) {
                props.load(new FileInputStream(keystoreProps))
            } else {
                def propsFile = rootProject.file('gradle.properties')
                if (propsFile.exists()) {
                    props.load(new FileInputStream(propsFile))
                }
            }
            storeFile file(props.getProperty('IRONPAL_RELEASE_STORE_FILE', 'debug.keystore'))
            storePassword props.getProperty('IRONPAL_RELEASE_STORE_PASSWORD', 'android')
            keyAlias props.getProperty('IRONPAL_RELEASE_KEY_ALIAS', 'androiddebugkey')
            keyPassword props.getProperty('IRONPAL_RELEASE_KEY_PASSWORD', 'android')
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Signed with the release config so the APK is sideloadable (D4).
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin.
    implementation("com.facebook.react:react-android")

    // CameraX — sharpest-still capture (Q5) + frame sequence (pushdown vision).
    def cameraxVersion = "1.3.4"
    implementation("androidx.camera:camera-core:${cameraxVersion}")
    implementation("androidx.camera:camera-camera2:${cameraxVersion}")
    implementation("androidx.camera:camera-lifecycle:${cameraxVersion}")
    implementation("androidx.camera:camera-view:${cameraxVersion}")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

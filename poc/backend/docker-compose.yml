services:
  postgres:
    image: postgres:16-alpine
    container_name: ironpal_poc_pg
    environment:
      POSTGRES_USER: ironpal
      POSTGRES_PASSWORD: ironpal
      POSTGRES_DB: ironpal_poc
    ports:
      - "5544:5432"   # host 5544 → container 5432 (avoids clashing with a local pg)
    volumes:
      - ironpal_poc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ironpal -d ironpal_poc"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  ironpal_poc_pgdata:
